name: R Pipeline Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("lintr", "data.table", "dplyr", "tidyr",
                             "ggplot2", "patchwork", "stringr",
                             "broom", "jsonlite", "R.utils"))
        shell: Rscript {0}

      - name: Lint scripts
        run: |
          library(lintr)
          scripts <- list.files("R/", pattern = "\\.R$", full.names = TRUE)
          issues  <- lapply(scripts, lint)
          n_issues <- sum(sapply(issues, length))
          cat(sprintf("Total lint issues: %d\n", n_issues))
          if (n_issues > 20) stop("Too many lint issues")
        shell: Rscript {0}

      - name: Check config loads
        run: source("R/config.R")
        shell: Rscript {0}
